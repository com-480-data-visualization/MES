<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="src/styles/style.css">
    <meta charset="utf-8">
    <title>MES</title>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
<script type="module" src="/src/test.js"></script>
<main id="welcomeOverlay" class="welcome-overlay">
    <section class="welcome-panel">
        <p class="welcome-kicker">Repository visualization</p>
        <h1>MES</h1>
        <form id="repoForm" class="welcome-form">
            <label for="repoUrl">GitHub repository URL</label>
            <div class="welcome-input-row">
                <input
                    id="repoUrl"
                    name="repoUrl"
                    type="text"
                    placeholder="https://github.com/owner/repository"
                    autocomplete="url"
                    required
                >
                <button type="submit">Enter</button>
            </div>
        </form>
    </section>
</main>
<div id="container" class="viz-ui is-hidden">
    <div id="box1" class="box">
        <span id="repoLabel">Repository selected</span><br>
        <button id="myButton">Click me</button>
    </div>
</div>

<div class="timeline viz-ui is-hidden">
    <div id="ruler"></div>
    <div id="marker"></div>
</div>
</body>

</html>

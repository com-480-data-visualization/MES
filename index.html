<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="src/styles/style.css">
    <meta charset="utf-8">
    <title>MES</title>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
<script type="module" src="/src/main.js"></script>
<button
    id="homeButton"
    class="home-button viz-ui is-hidden"
    type="button"
    aria-label="Return to welcome screen"
    title="Return to welcome screen"
>
    <span class="home-icon" aria-hidden="true"></span>
</button>
<main id="welcomeOverlay" class="welcome-overlay">
    <section class="welcome-panel">
        <p class="welcome-kicker">Repository visualization</p>
        <h1>MES</h1>
        <form id="repoForm" class="welcome-form">
            <label for="repoUrl">GitHub repository URL</label>
            <div class="welcome-input-row">
                <input
                    id="repoUrl"
                    name="repoUrl"
                    type="text"
                    placeholder="https://github.com/owner/repository"
                    autocomplete="url"
                    required
                >
                <button type="submit">Enter</button>
            </div>
        </form>
    </section>
</main>
<div id="container" class="viz-ui is-hidden">
    <div id="box1" class="box">
        <span id="repoLabel">Repository selected</span><br>
        <svg id="general-graph" width="200" height="200"></svg>
        <main class="ld_card">
            <h3 id="ld_header">Top Committers</h3>
            <div id="leaderboard" class="leaderboard ld_scrollbar"></div>
        </main>
    </div>
</div>

<div class="chrono viz-ui is-hidden">
    <svg class="chrono-svg" viewBox="0 0 220 220">
        <circle class="outer-ring" cx="110" cy="110" r="100" />
        <circle class="progress-bg" cx="110" cy="110" r="78" />
        <circle class="progress-ring" cx="110" cy="110" r="78" />
    </svg>
    <div class="time" id="time">00:00</div>
</div>
</body>

</html>
